<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹形成 · 刘费曼的科学课</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a12; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; color: #fff; user-select: none; }
  #canvas-container { width: 100vw; height: 100vh; position: fixed; inset: 0; }
  #panel {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(14px);
    padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    max-width: 320px;
  }
  #panel h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  #panel .sub { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.6; }
  #controls {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 6px;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
    padding: 8px 10px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #controls button {
    padding: 6px 14px; border: none; border-radius: 8px;
    background: transparent; color: rgba(255,255,255,0.5);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 0.3px;
  }
  #controls button:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
  #controls button.active { color: #fff; background: rgba(255,255,255,0.14); }
  #hint {
    position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%);
    z-index: 5; font-size: 11px; color: rgba(255,255,255,0.15);
    pointer-events: none; transition: opacity 2s ease;
  }
  @media (max-width: 768px) {
    #panel { top: 16px; left: 16px; padding: 10px 14px; max-width: 240px; }
    #panel h1 { font-size: 16px; }
    #controls button { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="panel">
  <h1>🌈 彩虹形成</h1>
  <div class="sub">阳光进入雨滴时发生折射,再从内壁反射,然后再次折射出来。不同色光折射率不同,因此从雨滴背面以 ~42° 角散开 — 观察者看到的就是七彩的圆弧。</div>
</div>

<div id="controls">
  <button data-mode="droplets" class="active">💧 水滴阵列</button>
  <button data-mode="single">🔍 单滴放大</button>
  <button data-mode="rainbow">🌈 完整彩虹</button>
</div>

<div id="hint">🖱 拖拽旋转 · 滚轮缩放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 14);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 30;
controls.maxPolarAngle = Math.PI / 1.8;

/* ---- Lights ---- */
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sunLight = new THREE.DirectionalLight(0xffeecc, 1.4);
sunLight.position.set(-15, 20, 10);
scene.add(sunLight);
const fill = new THREE.PointLight(0x6688ff, 0.5, 30);
fill.position.set(8, 4, 5);
scene.add(fill);

/* ============================================================
   SUN (visual marker, far away)
   ============================================================ */
const sunGroup = new THREE.Group();
sunGroup.position.set(-18, 22, 12);
scene.add(sunGroup);
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffee88 })
);
sunGroup.add(sunMesh);
const sunGlow = new THREE.Mesh(
  new THREE.SphereGeometry(2.2, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.25, side: THREE.BackSide })
);
sunGroup.add(sunGlow);

/* ============================================================
   DROPLET — built once, reused via clones
   ============================================================ */
const DROPLET_COUNT_BY_MODE = { droplets: 80, single: 1, rainbow: 120 };

function createDroplet() {
  const geo = new THREE.SphereGeometry(0.35, 24, 24);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xaaccff,
    metalness: 0,
    roughness: 0.05,
    transmission: 0.9,
    thickness: 0.6,
    ior: 1.33,
    transparent: true,
    opacity: 0.7,
  });
  return new THREE.Mesh(geo, mat);
}

const dropletsGroup = new THREE.Group();
scene.add(dropletsGroup);

/* "Internal reflection" beam for single drop mode */
let lightBeam = null;
let rainbowArcs = [];

/* ============================================================
   MODE: droplets (grid of falling drops)
   ============================================================ */
function buildDropletsGrid() {
  clearScene();
  const cols = 12, rows = 7, spacing = 1.4;
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      const d = createDroplet();
      d.position.set(
        (i - cols / 2 + 0.5) * spacing,
        (j - rows / 2 + 0.5) * spacing + 1,
        0
      );
      d.userData.baseY = d.position.y;
      d.userData.phase = Math.random() * Math.PI * 2;
      dropletsGroup.add(d);
    }
  }
}

/* ============================================================
   MODE: single (one big drop with light path traced)
   ============================================================ */
function buildSingleDrop() {
  clearScene();
  const d = createDroplet();
  d.scale.setScalar(3);
  d.position.set(0, 0, 0);
  dropletsGroup.add(d);

  // Light ray in
  const rayIn = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 6, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 })
  );
  rayIn.position.set(-4, 1.5, 0);
  rayIn.rotation.z = Math.PI / 2 - 0.3;
  scene.add(rayIn);

  // Internal path (3 reflections)
  const internalGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-2, 0.7, 0),
    new THREE.Vector3(0, -0.5, 0),
    new THREE.Vector3(0.8, 0.5, 0),
    new THREE.Vector3(0, 1.2, 0),
    new THREE.Vector3(-1.5, 1.0, 0),
  ]);
  const internalLine = new THREE.Line(
    internalGeo,
    new THREE.LineBasicMaterial({ color: 0xffdd66, transparent: true, opacity: 0.7 })
  );
  scene.add(internalLine);

  // Rainbow exit rays (7 colors, slightly fanning out)
  const RAINBOW = [
    { c: 0xff0000, a: -0.45 },
    { c: 0xff7f00, a: -0.30 },
    { c: 0xffff00, a: -0.15 },
    { c: 0x00ff00, a:  0.00 },
    { c: 0x0000ff, a:  0.15 },
    { c: 0x4b0082, a:  0.30 },
    { c: 0x9400d3, a:  0.45 },
  ];
  RAINBOW.forEach((r) => {
    const ray = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 5, 10),
      new THREE.MeshBasicMaterial({ color: r.c, transparent: true, opacity: 0.85 })
    );
    ray.position.set(-2 + Math.cos(r.a) * 2.5, 1.0 + Math.sin(r.a) * 2.5, 0);
    ray.rotation.z = r.a - Math.PI / 2;
    scene.add(ray);
  });
}

/* ============================================================
   MODE: rainbow (drops arranged in a 42° arc)
   ============================================================ */
function buildRainbow() {
  clearScene();
  const ARC_DEG = 180;
  const ARC_RADIUS = 10;
  const dropCount = DROPLET_COUNT_BY_MODE.rainbow;
  const center = new THREE.Vector3(0, -8, 0);

  for (let i = 0; i < dropCount; i++) {
    const t = i / (dropCount - 1);
    const angle = (t - 0.5) * ARC_DEG * Math.PI / 180;
    const x = Math.cos(angle) * ARC_RADIUS;
    const y = Math.sin(angle) * ARC_RADIUS;
    const d = createDroplet();
    d.position.set(x, y + center.y, 0);
    d.scale.setScalar(0.6);
    d.userData.baseY = d.position.y;
    d.userData.phase = Math.random() * Math.PI * 2;
    dropletsGroup.add(d);
  }

  // Faint rainbow arc background
  const arcPts = [];
  for (let i = 0; i <= 60; i++) {
    const t = i / 60;
    const angle = (t - 0.5) * ARC_DEG * Math.PI / 180;
    const x = Math.cos(angle) * (ARC_RADIUS + 0.5);
    const y = Math.sin(angle) * (ARC_RADIUS + 0.5) + center.y;
    arcPts.push(new THREE.Vector3(x, y, -1));
  }
  const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPts);
  const colors = new Float32Array(arcPts.length * 3);
  for (let i = 0; i < arcPts.length; i++) {
    const t = i / (arcPts.length - 1);
    let c = new THREE.Color();
    if (t < 0.16) c.setHex(0xff0000);
    else if (t < 0.33) c.setHex(0xff7f00);
    else if (t < 0.5)  c.setHex(0xffff00);
    else if (t < 0.66) c.setHex(0x00ff00);
    else if (t < 0.83) c.setHex(0x0000ff);
    else c.setHex(0x9400d3);
    colors[i*3]     = c.r;
    colors[i*3 + 1] = c.g;
    colors[i*3 + 2] = c.b;
  }
  arcGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const arcMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.4 });
  const arcLine = new THREE.Line(arcGeo, arcMat);
  scene.add(arcLine);
  rainbowArcs.push(arcLine);
}

/* ============================================================
   Helpers
   ============================================================ */
function clearScene() {
  while (dropletsGroup.children.length) {
    const m = dropletsGroup.children.pop();
    m.geometry?.dispose();
    m.material?.dispose();
  }
  // Remove transient objects (light beam, internal lines, exit rays, rainbow)
  const toRemove = [];
  scene.children.forEach((c) => {
    if (c === dropletsGroup || c === sunGroup) return;
    if (c.isLight || c.isCamera) return;
    if (c.isMesh || c.isLine) toRemove.push(c);
  });
  toRemove.forEach((c) => {
    scene.remove(c);
    c.geometry?.dispose();
    if (c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
  rainbowArcs = [];
}

/* ============================================================
   Mode switching
   ============================================================ */
let currentMode = 'droplets';
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('#controls button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  if (mode === 'droplets') buildDropletsGrid();
  else if (mode === 'single') buildSingleDrop();
  else if (mode === 'rainbow') buildRainbow();
}

document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

/* ============================================================
   ANIMATION
   ============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  // Sun pulse
  sunGlow.material.opacity = 0.2 + Math.sin(elapsed * 1.2) * 0.08;

  // Droplets bobbing motion
  dropletsGroup.children.forEach((d) => {
    if (d.userData.baseY !== undefined) {
      d.position.y = d.userData.baseY + Math.sin(elapsed * 1.5 + d.userData.phase) * 0.1;
    }
  });

  // Camera target slow pan
  if (currentMode === 'rainbow') {
    controls.target.y = -3;
  } else {
    controls.target.y = 0;
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);

/* Start */
buildDropletsGrid();
animate();
console.log('🌈 彩虹形成 — 刘费曼的科学课');
</script>
</body>
</html>
