<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四季更替 · 刘费曼的科学课</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a12; font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; user-select: none; }
  #canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

  #info-panel {
    position: fixed; top: 28px; left: 32px; z-index: 10; pointer-events: none;
  }
  #info-panel .title {
    font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
    background: rgba(255,255,255,0.07); backdrop-filter: blur(12px);
    padding: 6px 18px; border-radius: 10px; display: inline-block;
    border: 1px solid rgba(255,255,255,0.06);
  }
  #info-panel .desc {
    font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px;
    padding-left: 4px; font-weight: 400; max-width: 380px; line-height: 1.5;
  }
  #info-panel .season-label {
    font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 6px; padding-left: 4px;
    font-weight: 500;
  }
  #info-panel .angle-info {
    font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 3px; padding-left: 4px;
  }

  #controls {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 12px 20px 16px;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
    border-radius: 16px; border: 1px solid rgba(255,255,255,0.07);
    min-width: 440px;
  }
  #controls .btn-row { display: flex; gap: 6px; }
  #controls button {
    padding: 8px 16px; border: none; border-radius: 8px;
    background: transparent; color: rgba(255,255,255,0.45);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: inherit;
  }
  #controls button:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
  #controls button.active { color: #fff; background: rgba(255,255,255,0.12); }

  #orbit-slider {
    display: flex; align-items: center; gap: 12px; width: 100%; padding: 0 8px;
  }
  #orbit-slider .orbit-label {
    font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; min-width: 50px; text-align: center;
  }
  #orbit-slider input[type="range"] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 4px; border-radius: 2px;
    background: linear-gradient(to right, #22c55e, #eab308, #f97316, #3b82f6, #22c55e);
    outline: none; cursor: pointer;
  }
  #orbit-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #ccc);
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.3);
  }

  #hint {
    position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
    z-index: 5; font-size: 11px; color: rgba(255,255,255,0.12); pointer-events: none;
    transition: opacity 2s ease;
  }

  #loading {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a12; color: rgba(255,255,255,0.6); font-size: 14px;
    transition: opacity 0.8s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.08);
    border-top-color: rgba(255,255,255,0.4); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    #info-panel { top: 16px; left: 16px; }
    #info-panel .title { font-size: 18px; padding: 4px 12px; }
    #info-panel .desc { font-size: 11px; max-width: 200px; }
    #controls { bottom: 16px; min-width: unset; width: 94vw; padding: 8px 10px 12px; }
    #controls button { padding: 6px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>加载四季场景...</span>
</div>

<div id="canvas-container"></div>

<div id="info-panel">
  <div class="title" id="seasonTitle">🌍 四季更替</div>
  <div class="season-label" id="seasonName">春分</div>
  <div class="desc" id="seasonDesc">太阳直射赤道，昼夜平分，北半球进入春季</div>
  <div class="angle-info" id="angleInfo">地轴倾斜角: 23.5° · 太阳直射纬度: 0°</div>
</div>

<div id="controls">
  <div class="btn-row">
    <button data-season="0" class="active">🌸 春分</button>
    <button data-season="1">☀️ 夏至</button>
    <button data-season="2">🍂 秋分</button>
    <button data-season="3">❄️ 冬至</button>
    <button data-season="play">▶️ 公转动画</button>
  </div>
  <div id="orbit-slider">
    <span class="orbit-label">轨道</span>
    <input type="range" id="orbitSlider" min="0" max="360" step="1" value="0">
    <span class="orbit-label" id="orbitDegree">0°</span>
  </div>
</div>

<div id="hint">🖱 拖拽旋转 · 滚轮缩放 · 拖动滑块观察地球公转</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ========== SCENE SETUP ========== */
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 25, 45);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 15;
controls.maxDistance = 80;
controls.target.set(0, 0, 0);

/* ========== LIGHTS ========== */
const ambientLight = new THREE.AmbientLight(0x333344, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
sunLight.position.set(50, 10, 0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
scene.add(sunLight);

/* ========== SUN ========== */
const sunGroup = new THREE.Group();
scene.add(sunGroup);
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(3, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffdd44 })
);
sunGroup.add(sunMesh);
for (let i = 0; i < 3; i++) {
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(3.5 + i * 1.2, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.06 - i * 0.015, side: THREE.BackSide })
  );
  sunGroup.add(glow);
}
sunGroup.position.set(50, 0, 0);

// Sun rays
const rayMat = new THREE.LineBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.1 });
for (let i = 0; i < 12; i++) {
  const theta = (i / 12) * Math.PI * 2;
  const points = [
    new THREE.Vector3(Math.cos(theta) * 3.5, Math.sin(theta) * 3.5, 0),
    new THREE.Vector3(Math.cos(theta) * 5, Math.sin(theta) * 5, 0),
  ];
  sunGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), rayMat));
}

/* ========== ORBIT PATH ========== */
const orbitPoints = [];
const ORBIT_RADIUS = 35;
for (let i = 0; i <= 64; i++) {
  const angle = (i / 64) * Math.PI * 2;
  orbitPoints.push(new THREE.Vector3(Math.cos(angle) * ORBIT_RADIUS, 0, Math.sin(angle) * ORBIT_RADIUS));
}
const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
const orbitMat = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.2 });
const orbitLine = new THREE.Line(orbitGeo, orbitMat);
scene.add(orbitLine);

// Orbit markers (season positions)
const seasonPositions = [0, Math.PI / 2, Math.PI, Math.PI * 1.5];
const seasonColors = [0x22c55e, 0xf97316, 0xeab308, 0x3b82f6];
seasonPositions.forEach((angle, i) => {
  const marker = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshBasicMaterial({ color: seasonColors[i], transparent: true, opacity: 0.5 })
  );
  marker.position.set(Math.cos(angle) * ORBIT_RADIUS, 0, Math.sin(angle) * ORBIT_RADIUS);
  scene.add(marker);
});

/* ========== EARTH ========== */
const earthGroup = new THREE.Group();
scene.add(earthGroup);

// Earth sphere with simple continent coloring
const earthGeo = new THREE.SphereGeometry(2.5, 48, 48);
const earthMat = new THREE.MeshStandardMaterial({
  color: 0x2563eb, roughness: 0.7, metalness: 0.1,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
earth.castShadow = true;
earth.receiveShadow = true;
earthGroup.add(earth);

// Continents (simplified as green patches)
const continentGeo = new THREE.SphereGeometry(2.52, 24, 24);
const continentMat = new THREE.MeshStandardMaterial({
  color: 0x16a34a, roughness: 0.9, transparent: true, opacity: 0.7,
});
// We'll use a simple approach - add some green spheres slightly above earth
const continents = [
  { pos: [1, 0.5, 1.5], scale: 0.8 },
  { pos: [-1.2, 0.3, 1.2], scale: 0.6 },
  { pos: [0.5, -0.8, 1.8], scale: 0.5 },
  { pos: [-0.5, 0.8, -1.8], scale: 0.7 },
];
continents.forEach(c => {
  const cont = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0x15803d, roughness: 0.9, transparent: true, opacity: 0.6 })
  );
  cont.position.set(...c.pos);
  cont.scale.setScalar(c.scale);
  earthGroup.add(cont);
});

// Atmosphere glow
const atmoGeo = new THREE.SphereGeometry(2.8, 32, 32);
const atmoMat = new THREE.MeshBasicMaterial({
  color: 0x4488ff, transparent: true, opacity: 0.08, side: THREE.BackSide,
});
const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
earthGroup.add(atmosphere);

// Axis tilt indicator (23.5 degrees)
const axisGeo = new THREE.CylinderGeometry(0.03, 0.03, 8, 8);
const axisMat = new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.4 });
const axis = new THREE.Mesh(axisGeo, axisMat);
axis.position.y = 0;
earthGroup.add(axis);

// North/South poles markers
const northPole = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xff4444 })
);
northPole.position.y = 4;
earthGroup.add(northPole);

const southPole = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x4444ff })
);
southPole.position.y = -4;
earthGroup.add(southPole);

// Equator line
const equatorPoints = [];
for (let i = 0; i <= 64; i++) {
  const angle = (i / 64) * Math.PI * 2;
  equatorPoints.push(new THREE.Vector3(Math.cos(angle) * 2.55, 0, Math.sin(angle) * 2.55));
}
const equatorGeo = new THREE.BufferGeometry().setFromPoints(equatorPoints);
const equatorMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
const equatorLine = new THREE.Line(equatorGeo, equatorMat);
earthGroup.add(equatorLine);

// Tropic lines
[-0.42, 0.42].forEach(lat => {
  const r = Math.cos(lat) * 2.55;
  const y = Math.sin(lat) * 2.55;
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
  }
  const line = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.15 })
  );
  earthGroup.add(line);
});

/* ========== STARS ========== */
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(500 * 3);
for (let i = 0; i < 500; i++) {
  const r = 100 + Math.random() * 100;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.cos(phi);
  starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

/* ========== SEASON DATA ========== */
const SEASONS = [
  {
    name: '春分', icon: '🌸',
    desc: '太阳直射赤道，昼夜平分，北半球进入春季',
    orbitAngle: 0, sunLat: 0,
    skyColor: 0x1a2a3a, groundColor: 0x2d5016,
  },
  {
    name: '夏至', icon: '☀️',
    desc: '太阳直射北回归线，北半球白昼最长，进入盛夏',
    orbitAngle: Math.PI / 2, sunLat: 23.5,
    skyColor: 0x1a2a4a, groundColor: 0x4a7c1a,
  },
  {
    name: '秋分', icon: '🍂',
    desc: '太阳再次直射赤道，昼夜平分，北半球进入秋季',
    orbitAngle: Math.PI, sunLat: 0,
    skyColor: 0x2a2a3a, groundColor: 0x5c4a1a,
  },
  {
    name: '冬至', icon: '❄️',
    desc: '太阳直射南回归线，北半球白昼最短，进入寒冬',
    orbitAngle: Math.PI * 1.5, sunLat: -23.5,
    skyColor: 0x1a1a2e, groundColor: 0x3a3a2a,
  },
];

let currentSeason = 0;
let orbitAngle = 0;
let autoPlay = false;
let targetOrbitAngle = 0;

// Apply 23.5° axial tilt
earthGroup.rotation.z = 23.5 * Math.PI / 180;

function setSeason(idx) {
  currentSeason = idx;
  const s = SEASONS[idx];
  targetOrbitAngle = s.orbitAngle;
  document.getElementById('seasonName').textContent = s.icon + ' ' + s.name;
  document.getElementById('seasonDesc').textContent = s.desc;
  document.getElementById('angleInfo').textContent = `地轴倾斜角: 23.5° · 太阳直射纬度: ${s.sunLat}°`;
  document.getElementById('orbitSlider').value = (s.orbitAngle / (Math.PI * 2) * 360);
  document.getElementById('orbitDegree').textContent = Math.round(s.orbitAngle / (Math.PI * 2) * 360) + '°';
  document.querySelectorAll('#controls button').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.season) === idx);
  });
}

document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = btn.dataset.season;
    if (s === 'play') {
      autoPlay = !autoPlay;
      btn.textContent = autoPlay ? '⏸️ 暂停' : '▶️ 公转动画';
      return;
    }
    autoPlay = false;
    document.querySelector('button[data-season="play"]').textContent = '▶️ 公转动画';
    setSeason(parseInt(s));
  });
});

const orbitSlider = document.getElementById('orbitSlider');
orbitSlider.addEventListener('input', () => {
  autoPlay = false;
  document.querySelector('button[data-season="play"]').textContent = '▶️ 公转动画';
  targetOrbitAngle = parseFloat(orbitSlider.value) / 360 * Math.PI * 2;
  document.getElementById('orbitDegree').textContent = orbitSlider.value + '°';
  // Find closest season
  const deg = parseFloat(orbitSlider.value);
  if (deg < 45 || deg > 315) setSeason(0);
  else if (deg < 135) setSeason(1);
  else if (deg < 225) setSeason(2);
  else setSeason(3);
});

/* ========== ANIMATION ========== */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Auto-play
  if (autoPlay) {
    targetOrbitAngle += delta * 0.3;
    if (targetOrbitAngle > Math.PI * 2) targetOrbitAngle -= Math.PI * 2;
    orbitSlider.value = (targetOrbitAngle / (Math.PI * 2) * 360);
    document.getElementById('orbitDegree').textContent = Math.round(targetOrbitAngle / (Math.PI * 2) * 360) + '°';
  }

  // Smooth orbit transition
  let diff = targetOrbitAngle - orbitAngle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  orbitAngle += diff * delta * 3;

  // Update earth position
  earthGroup.position.x = Math.cos(orbitAngle) * ORBIT_RADIUS;
  earthGroup.position.z = Math.sin(orbitAngle) * ORBIT_RADIUS;

  // Earth rotation
  earthGroup.rotation.y += delta * 0.3;

  // Update sun position (always on the -x side relative to earth for lighting)
  const sunAngle = orbitAngle + Math.PI;
  sunGroup.position.x = Math.cos(sunAngle) * 50;
  sunGroup.position.z = Math.sin(sunAngle) * 50;
  sunLight.position.copy(sunGroup.position);

  // Sky color based on season
  const s = SEASONS[currentSeason];
  const targetSky = new THREE.Color(s.skyColor);
  scene.background.lerp(targetSky, delta * 2);

  // Season-based earth color
  const targetGround = new THREE.Color(s.groundColor);
  earthMat.color.lerp(targetGround, delta * 2);

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

document.getElementById('loading').classList.add('hidden');
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 6000);

// Initial position
setSeason(0);

animate();
console.log('🌍 四季更替 v1 — 刘费曼的科学课 | 拖动滑块观察地球公转与季节变化');
</script>
</body>
</html>
