<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS PWA 图标（关键！iOS 添加到主屏幕时优先使用这些） -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- 防止 iOS 自动添加圆角和光泽效果 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="小纸条" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#F8FAFC" />

    <!-- Viewport（viewport-fit=cover 让内容延伸到刘海屏区域） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui" />

    <!-- SEO -->
    <meta name="description" content="小纸条 - 一个温暖的角落,收下每封写给你的信" />
    <meta name="keywords" content="小纸条,Letters,啊哈时刻,写信,匿名,灵感,日记" />
    <meta name="author" content="小纸条 Letters" />

    <!-- Open Graph(分享到微信/Twitter/钉钉 卡片) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="小纸条 / Letters" />
    <meta property="og:description" content="一个温暖的角落,收下每封写给你的信" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="小纸条" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="小纸条 / Letters" />
    <meta name="twitter:description" content="一个温暖的角落,收下每封写给你的信" />

    <title>小纸条 / Letters</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
